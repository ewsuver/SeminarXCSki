<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XC Skiing History Globe</title>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #globeViz {
      width: 100vw;
      height: calc(100vh - 120px);
      z-index: 1;
      position: relative;
    }

    h1 {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 20;
    }
    
    #infoBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.97);
      padding: 36px;
      border-radius: 14px;
      max-width: 880px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      display: none;
      z-index: 100;
      box-shadow: 0 14px 40px rgba(0,0,0,0.45);
    }

    #infoBox .content {
      display: flex;
      gap: 36px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #infoBox .text-section {
      flex: 1;
      text-align: left;
    }

    #infoBox h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #333;
    }

    #infoBox .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    #infoBox p {
      margin: 0 0 20px 0;
      font-size: 15px;
      color: #555;
      line-height: 1.5;
    }

    #infoBox .image-section {
      flex-shrink: 0;
    }

    #infoBox img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    #infoBox .popup-actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      width: 100%;
    }

    #infoBox button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #infoBox button:hover {
      background: #0056b3;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 50;
    }

    /* Timeline */
    #timeline {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: rgba(0, 0, 0, 0.95);
      border-top: 2px solid #fff;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      box-sizing: border-box;
    }

    .timeline-selected-year {
      color: white;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .timeline-rail {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 12px;
      border-radius: 6px;
      background: rgba(100, 150, 255, 0.15);
      cursor: pointer;
      user-select: none;
    }

    .timeline-active-range {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 12px;
      border-radius: 6px;
      background: rgba(100, 150, 255, 0.35);
      pointer-events: none;
      z-index: 1;
    }

    .timeline-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #6496ff;
      border: 3px solid #fff;
      box-shadow: 0 0 14px rgba(100, 150, 255, 0.7);
      cursor: grab;
      z-index: 2;
      transition: transform 0.15s ease;
    }

    .timeline-handle.dragging {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .timeline-markers {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      color: rgba(220, 220, 220, 0.9);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .timeline-marker {
      text-align: center;
      width: 1px;
    }

    .timeline-marker:before {
      content: "";
      display: block;
      width: 1px;
      height: 10px;
      margin: 0 auto 6px;
      background: rgba(180, 180, 180, 0.7);
    }

    /* Tooltip styles */
    .pin-tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 25;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: none;
    }
  </style>
</head>

<body>

<h1>History of Cross-Country Skiing<br>Eli Suver</h1>


<div id="globeViz"></div>
<div id="infoBox"></div>
<div id="overlay"></div>
<div class="pin-tooltip" id="pinTooltip"></div>
<div id="timeline">
  <div class="timeline-selected-year" id="selectedYearLabel">Selected year: 1500</div>
  <div class="timeline-rail" id="timelineRail">
    <div class="timeline-active-range" id="activeRange"></div>
    <div class="timeline-handle" id="timelineHandle"></div>
  </div>
  <div class="timeline-markers">
    <div class="timeline-marker">1000</div>
    <div class="timeline-marker">1250</div>
    <div class="timeline-marker">1500</div>
    <div class="timeline-marker">1750</div>
    <div class="timeline-marker">2000</div>
    <div class="timeline-marker">2025</div>
  </div>
</div>

<script>


// Timeline state
const timelineMin = 1000;
const timelineMax = 2025;
const yearWindow = 250;
let currentYear = 1500;
let globeInstance;
let locationElements = [];
let locations = [];

// Load locations from JSON
fetch('locations.json')
  .then(response => response.json())
  .then(data => {
    locations = data.map(loc => ({
      ...loc,
      yearRange: parseDateRange(loc.date)
    }));
    initializeGlobe();
  });

function initializeGlobe() {
  const infoBox = document.getElementById("infoBox");

  globeInstance = Globe()(document.getElementById("globeViz"))
  .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('#000000')
  .htmlElementsData(locations)
  .htmlLat(d => d.lat)
  .htmlLng(d => d.lng)
  .htmlElement(d => {
    const el = document.createElement('img');

    el.src = "ski.png";
    el.style.width = "28px";
    el.style.height = "28px";
    el.style.cursor = "pointer";
    el.style.transform = "translate(-50%, -50%)";
    el.style.pointerEvents = "auto";

    locationElements.push(el);

    el.addEventListener("click", (event) => {
      event.stopPropagation();

      document.getElementById("overlay").style.display = "block";
      infoBox.style.display = "block";

      infoBox.innerHTML = `
        <div class="content">
          <div class="text-section">
            <h2>${d.name}</h2>
            <div class="meta">${d.date}</div>
            <p>${d.info}</p>
          </div>
          <div class="image-section">
            <img src="${d.image}" alt="${d.name}">
          </div>
        </div>
        <div class="popup-actions">
          <button onclick="closePopup()">Close</button>
        </div>
      `;
    });

    el.onmouseenter = () => el.style.transform = "translate(-50%, -50%) scale(1.3)";
    el.onmouseleave = () => el.style.transform = "translate(-50%, -50%) scale(1)";

    el.addEventListener("mouseover", (event) => {
      const tooltip = document.getElementById("pinTooltip");
      tooltip.textContent = `${d.name}`;
      tooltip.style.display = "block";
      tooltip.style.left = (event.clientX + 10) + "px";
      tooltip.style.top = (event.clientY + 10) + "px";
    });

    el.addEventListener("mousemove", (event) => {
      const tooltip = document.getElementById("pinTooltip");
      if (tooltip.style.display === "block") {
        tooltip.style.left = (event.clientX + 10) + "px";
        tooltip.style.top = (event.clientY + 10) + "px";
      }
    });

    el.addEventListener("mouseout", () => {
      document.getElementById("pinTooltip").style.display = "none";
    });

    return el;
  });

  globeInstance.controls().autoRotate = false;
  globeInstance.controls().autoRotateSpeed = 0.5;

  updateTimelineDisplay();

  setTimeout(() => {
    updatePinVisibility();
  }, 100);
}

function parseDateRange(dateStr) {
  if (!dateStr) {
    return { start: timelineMin, end: timelineMax };
  }

  const normalized = dateStr
    .replace(/\s*AD\s*$/i, '')
    .replace(/Present/i, '2025')
    .replace(/BCE/i, '-');

  const parts = normalized.split('-').map(str => str.trim());
  const start = parseInt(parts[0], 10);
  const end = parts.length > 1 ? parseInt(parts[1], 10) : start;

  return {
    start: Number.isNaN(start) ? timelineMin : start,
    end: Number.isNaN(end) ? timelineMax : end
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function updateTimelineDisplay() {
  const rail = document.getElementById('timelineRail');
  const handle = document.getElementById('timelineHandle');
  const activeRange = document.getElementById('activeRange');
  const label = document.getElementById('selectedYearLabel');

  const railRect = rail.getBoundingClientRect();
  const pct = (currentYear - timelineMin) / (timelineMax - timelineMin);
  const left = pct * railRect.width;
  handle.style.left = `${left}px`;
  label.textContent = `Selected year: ${currentYear}`;

  const rangeStartYear = clamp(currentYear - yearWindow, timelineMin, timelineMax);
  const rangeEndYear = clamp(currentYear + yearWindow, timelineMin, timelineMax);
  const rangeStartPct = (rangeStartYear - timelineMin) / (timelineMax - timelineMin);
  const rangeEndPct = (rangeEndYear - timelineMin) / (timelineMax - timelineMin);

  activeRange.style.left = `${rangeStartPct * railRect.width}px`;
  activeRange.style.width = `${Math.max((rangeEndPct - rangeStartPct) * railRect.width, 0)}px`;
}

function setYearFromPosition(pageX) {
  const rail = document.getElementById('timelineRail');
  const rect = rail.getBoundingClientRect();
  const x = clamp(pageX - rect.left, 0, rect.width);
  const pct = x / rect.width;
  const year = Math.round(timelineMin + pct * (timelineMax - timelineMin));
  currentYear = clamp(year, timelineMin, timelineMax);
  updateTimelineDisplay();
  updatePinVisibility();
}

function updatePinVisibility() {
  locationElements.forEach((el, index) => {
    const location = locations[index];
    const isVisible = location.yearRange.end >= currentYear - yearWindow && location.yearRange.start <= currentYear + yearWindow;
    if (isVisible) {
      el.style.visibility = 'visible';
      el.style.pointerEvents = 'auto';
    } else {
      el.style.visibility = 'hidden';
      el.style.pointerEvents = 'none';
    }
  });
}

const timelineRail = document.getElementById('timelineRail');
const timelineHandle = document.getElementById('timelineHandle');
let draggingTimeline = false;

function startDrag(event) {
  draggingTimeline = true;
  timelineHandle.classList.add('dragging');
  timelineHandle.setPointerCapture(event.pointerId);
  setYearFromPosition(event.pageX);
}

function drag(event) {
  if (!draggingTimeline) return;
  setYearFromPosition(event.pageX);
}

function endDrag(event) {
  if (!draggingTimeline) return;
  draggingTimeline = false;
  timelineHandle.classList.remove('dragging');
  timelineHandle.releasePointerCapture(event.pointerId);
}

timelineRail.addEventListener('click', (event) => {
  if (event.target === timelineHandle) return;
  setYearFromPosition(event.pageX);
});
timelineHandle.addEventListener('pointerdown', startDrag);
timelineHandle.addEventListener('pointermove', drag);
timelineHandle.addEventListener('pointerup', endDrag);
timelineHandle.addEventListener('pointercancel', endDrag);

document.addEventListener('pointerup', () => {
  if (draggingTimeline) {
    draggingTimeline = false;
    timelineHandle.classList.remove('dragging');
  }
});

function closePopup() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("infoBox").style.display = "none";
}

document.getElementById("overlay").onclick = closePopup;

</script>

</body>
</html>
