<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XC Skiing History Globe</title>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #globeViz {
      width: 100vw;
      height: calc(100vh - 120px);
      z-index: 1;
      position: relative;
    }

    h1 {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 20;
    }

    #infoBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.97);
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      display: none;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    #infoBox .content {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    #infoBox .text-section {
      flex: 1;
      text-align: left;
    }

    #infoBox h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #333;
    }

    #infoBox .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    #infoBox p {
      margin: 0 0 20px 0;
      font-size: 15px;
      color: #555;
      line-height: 1.5;
    }

    #infoBox .image-section {
      flex-shrink: 0;
    }

    #infoBox img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    #infoBox button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #infoBox button:hover {
      background: #0056b3;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 50;
    }

    /* Era buttons */
    #eraContainer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(0, 0, 0, 0.9);
      border-top: 2px solid #fff;
      z-index: 8;
      padding: 15px 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .era-btn {
      padding: 8px 20px;
      background: rgba(100, 150, 255, 0.3);
      color: white;
      border: 2px solid rgba(100, 150, 255, 0.6);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .era-btn:hover {
      background: rgba(100, 150, 255, 0.5);
      border-color: rgba(100, 150, 255, 1);
    }

    .era-btn.active {
      background: rgba(100, 150, 255, 0.8);
      border-color: #6496ff;
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.6);
    }
  </style>
</head>

<body>

<h1>History of Cross-Country Skiing</h1>

<div id="globeViz"></div>
<div id="infoBox"></div>
<div id="overlay"></div>
<div id="eraContainer">
  <button class="era-btn active" onclick="filterByEra('ancient')">Ancient</button>
  <button class="era-btn" onclick="filterByEra('medieval')">Medieval</button>
  <button class="era-btn" onclick="filterByEra('modern')">Modern Era</button>
  <button class="era-btn" onclick="filterByEra('contemporary')">Contemporary</button>
  <button class="era-btn" onclick="filterByEra('all')">All Eras</button>
</div>

<script>


// Era state
let currentEra = "ancient";
let globeInstance;
let locationElements = [];
let locations = [];

// Load locations from JSON
fetch('locations.json')
  .then(response => response.json())
  .then(data => {
    locations = data;
    initializeGlobe();
  });

function initializeGlobe() {
  const infoBox = document.getElementById("infoBox");

  globeInstance = Globe()(document.getElementById("globeViz"))
  .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('#000000')
  .htmlElementsData(locations)
  .htmlLat(d => d.lat)
  .htmlLng(d => d.lng)
  .htmlElement(d => {
    const el = document.createElement('img');

    el.src = "ski.png";
    el.style.width = "28px";
    el.style.height = "28px";
    el.style.cursor = "pointer";
    el.style.transform = "translate(-50%, -50%)";
    el.style.pointerEvents = "auto";

    locationElements.push(el);

    el.addEventListener("click", (event) => {
      event.stopPropagation();

      document.getElementById("overlay").style.display = "block";
      infoBox.style.display = "block";

      infoBox.innerHTML = `
        <div class="content">
          <div class="text-section">
            <h2>${d.name}</h2>
            <div class="meta">${d.date}</div>
            <p>${d.info}</p>
            <button onclick="closePopup()">Close</button>
          </div>
          <div class="image-section">
            <img src="${d.image}" alt="${d.name}">
          </div>
        </div>
      `;
    });

    el.onmouseenter = () => el.style.transform = "translate(-50%, -50%) scale(1.3)";
    el.onmouseleave = () => el.style.transform = "translate(-50%, -50%) scale(1)";

    return el;
  });

  globeInstance.controls().autoRotate = false;
  globeInstance.controls().autoRotateSpeed = 0.5;

  // Initialize with ancient pins only
  setTimeout(() => {
    updatePinVisibility();
  }, 100);
}

function filterByEra(era) {
  currentEra = era;
  
  // Update button states
  document.querySelectorAll('.era-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  updatePinVisibility();
}

function updatePinVisibility() {
  locationElements.forEach((el, index) => {
    const location = locations[index];
    const isVisible = currentEra === "all" || location.era === currentEra;
    if (isVisible) {
      el.style.visibility = "visible";
      el.style.pointerEvents = "auto";
    } else {
      el.style.visibility = "hidden";
      el.style.pointerEvents = "none";
    }
  });
}

function closePopup() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("infoBox").style.display = "none";
}

document.getElementById("overlay").onclick = closePopup;

</script>

</body>
</html>
